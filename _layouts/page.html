---
layout: default
---

<main class="main-content page-shell" id="main">
  <header class="page-header">
    <p class="eyebrow">{{ page.eyebrow | default: "Academic profile" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </header>

  {{ content }}
</main>
