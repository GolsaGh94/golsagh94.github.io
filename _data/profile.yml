summary:
  - "Dr. Golsa Ghasemi is a medical doctor whose academic work centers on kidney disease, kidney transplantation, Hemodialysis, Nephrolithiasis, and acute kidney injury. Her research record also includes cardiovascular medicine, cardiac rehabilitation, acute coronary syndrome guidelines, dyslipidemia, hypertension, and evidence-based clinical care."
  - "Her experience spans independent research with nephrologists, cardiologists, and internists, clinical work as a general physician, and research assistance at Isfahan University of Medical Sciences. She has contributed to peer-reviewed publications, national and international nephrology congress presentations, registry design, and Iranian clinical practice guideline work."

